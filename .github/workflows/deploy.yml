name: Deploy

on:
  push:
    branches:
      - '**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          OUTPUT=$(npx wrangler pages deploy dist --project-name=mnemonic-ui --branch="${GITHUB_REF_NAME}")
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[^ ]*mnemonic-ui[^ ]*' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against deployed preview
        env:
          BASE_URL: ${{ needs.deploy.outputs.url }}
        run: npx playwright test
