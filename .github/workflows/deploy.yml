name: Deploy

on:
  push:
    branches:
      - '**'

jobs:
  preview:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.upload.outputs.url }}
      version_id: ${{ steps.upload.outputs.version_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload preview version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          OUTPUT=$(npx wrangler versions upload --message "${GITHUB_SHA}" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo 'https://[^ ]*workers\.dev' | tail -1)
          VERSION_ID=$(echo "$OUTPUT" | grep -Eo 'Version ID:[[:space:]]*[0-9a-f-]+' | grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"

  test:
    needs: preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against preview version
        env:
          BASE_URL: ${{ needs.preview.outputs.url }}
        run: npx playwright test

  promote-production:
    needs: [preview, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Promote version to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler versions deploy ${{ needs.preview.outputs.version_id }} --yes
